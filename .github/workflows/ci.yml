name: CI/CD Pipeline

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build & Test
    env:
      NEXT_PUBLIC_UMAMI_SCRIPT_URL: "https://umami.abyn.xyz/script.js"
      NEXT_PUBLIC_UMAMI_WEBSITE_ID: "2fbf2274-56e7-4333-981f-5568b599b3f7"
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: "1.3.14"

      - name: Cache Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Dependencies
        run: bun install --frozen-lockfile

      - name: Lint Code
        run: bun run lint

      - name: Typecheck TypeScript
        run: bun x tsc --noEmit

      - name: Run Tests
        run: bun test

      - name: Build Next.js Production App
        run: bun run build

      - name: Package Standalone Artifacts
        run: |
          mkdir -p dist

          # 1. Copy ALL standalone files (including the hidden .next folder)
          cp -r .next/standalone/. dist/

          # 2. Safely create and copy frontend assets (_next/static and public)
          mkdir -p dist/public dist/.next/static
          cp -r public/. dist/public/
          cp -r .next/static/. dist/.next/static/

          # 3. Copy deployment scripts if the folder exists
          if [ -d "deploy" ]; then cp -r deploy/. dist/; fi

      - name: Create Production Zip
        run: |
          cd dist
          zip -r ../abyndotxyz-build.zip .

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: abyndotxyz-production-build
          path: abyndotxyz-build.zip
          retention-days: 7

      - name: Deploy to GitHub Release
        if: github.event_name != 'pull_request'
        uses: ncipollo/release-action@v1
        with:
          artifacts: "abyndotxyz-build.zip"
          tag: "latest"
          name: "Latest Production Build"
          body: "Automated production build from commit ${{ github.sha }}."
          allowUpdates: true
          removeArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
